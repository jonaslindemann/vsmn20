[project]
site_name = "Software Development for Technical Applications - VSMN20"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "Worksheets (English)" = [
    { "Worksheet 1" = "assignment1_eng.md" },
    { "Worksheet 2" = "assignment2_eng.md" },
    { "Worksheet 3" = "assignment3_eng.md" },
    { "Worksheet 4" = "assignment4_eng.md" },
    { "Worksheet 5" = "assignment5_eng.md" },
    { "Final hand-in" = "assignment6.md" }
  ] },
  { "Guides" = [
    { "Creating tables with Tabulate" = "data_in_tables.md" },
    { "Installation guide for Windows" = "installation_guide_windows.md" },
    { "Installation guide for macOS" = "installation_guide_macos.md" },
    { "Installing Qt designer" = "installing_qt_designer.md" },
    { "Handling high DPI displays in Qt" = "high_dpi_qt.md" }
  ] },
  { "Links" = "links.md" }
]

extra_javascript = [
  "https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js",
  "javascripts/mathjax.js",
  "https://polyfill.io/v3/polyfill.min.js?features=es6",
  "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
]

[project.theme]
variant = "modern"

features = [
  "navigation.instant",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.top",
  "header.autohide"
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions]
admonition = {}
attr_list = {}
meta = {}
"pymdownx.highlight" = { anchor_linenums = true }
"pymdownx.inlinehilite" = {}
"pymdownx.snippets" = { base_path = "docs" }
"pymdownx.superfences" = {}
"pymdownx.tabbed" = { alternate_style = true }
"pymdownx.details" = {}
"pymdownx.arithmatex" = { generic = true }
